<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student result</title>
</head>

<body>
    <script>
        var marks = prompt("Enter your marks : ")
        if( marks >= 91 && marks <= 100){
            document.write("Grade : A");
        }
        else if(marks >= 81 ){
            document.write("Grade : A");
        }
        else{
            document.write("Not Found");
        }
    </script>
</body>

</html>
