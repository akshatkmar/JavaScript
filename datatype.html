<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Types</title>
</head>

<body>
    <script>
        // var 
        var x = 10;
        var x = 20;
        document.write(x + "<br>")

        var name = "Akshat"
        var name = "Kumar<br>"
        document.write(name)

        // let
        let a = 10;
        document.write(a + "<br>")

        // const
        const b = 69;
        document.write(b)

        // on console
        const city = "Delhi"
        console.log(city)
    </script>
</body>

</html>
